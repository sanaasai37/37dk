<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Garden - Schedule | さなの世界</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#333;
      --sub:#666;
      --accent:#4d79a0;
      --accent-light:#e3e6f2;
      --bg:#fafafe;
      --card:#fff;
      --line:#e5e7f3;
      --radius:18px;
      --shadow:0 8px 20px rgba(0,0,0,.06);
      --calCellH:64px; /* 行の高さ（memoriesと揃える） */
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background:var(--bg);
      color:var(--ink);
    }

    header{
      max-width:980px;
      margin:24px auto 8px;
      padding:0 20px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:6px;
    }

    .back-btn{
      text-decoration:none;
      color:var(--accent);
      font-weight:600;
      font-size:15px;
      border:1px solid var(--line);
      padding:8px 14px;
      border-radius:999px;
      background:var(--card);
      box-shadow:var(--shadow);
      transition:0.25s ease;
    }
    .back-btn:hover{ background:var(--accent-light); transform:translateY(-1px); }

    .page-title{
      font-size:22px;
      font-weight:700;
      margin:4px 0 0;
    }
    .page-sub{
      margin:0;
      font-size:14px;
      color:var(--sub);
    }

    .toggle{
      display:flex;
      gap:8px;
      justify-content:flex-start;
      margin-top:8px;
    }
    .toggle button{
      border:1px solid var(--line); background:var(--card);
      color:var(--sub); padding:8px 14px; border-radius:999px;
      font-weight:600; cursor:pointer; transition:.25s ease;
    }
    .toggle button.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
    .toggle button:hover{ background:var(--accent-light); }

    .schedule-window{
      max-width:980px; margin:16px auto 40px;
      padding:20px; background:var(--card);
      border-radius:var(--radius); box-shadow:var(--shadow);
    }

    /* ===== LIST ===== */
    .list-view{ display:grid; gap:12px; margin-top:8px; }
    .month-block{ text-align:left; margin:36px 0 20px; padding-left:10px; }
    .month-number{
      font-family:"Playfair Display","Noto Serif JP",serif;
      font-size:80px; font-weight:500; color:var(--accent);
      letter-spacing:0.08em; line-height:1;
    }
    .month-name{
      font-family:"Helvetica Neue","Inter","Noto Sans JP",sans-serif;
      font-size:14px; color:var(--sub); margin-top:2px; letter-spacing:0.05em;
    }
    .event-line{
      display:flex; align-items:flex-start; justify-content:flex-start;
      gap:14px; padding:6px 4px; border-bottom:1px solid var(--line);
    }
    .event-left{ width:46px; text-align:center; flex-shrink:0; }
    .event-day{ font-size:16px; font-weight:500; color:var(--ink); line-height:1.1; }
    .event-w{ font-size:12px; color:var(--sub); margin-top:2px; text-transform:lowercase; }
    .event-info{ flex:1; color:var(--ink); }
    .event-info .title{ font-weight:500; font-size:14.5px; line-height:1.6; letter-spacing:0.03em; }

    /* ===== CALENDAR ===== */
    .cal-view[hidden]{ display:none; }
    .cal-wrap{ background:none; border:none; padding:10px 0 20px; text-align:center; }

    .cal-nav{
      display:flex; align-items:center; justify-content:center;
      gap:16px; margin-bottom:12px;
    }
    .cal-nav h3{
      font-size:16px; font-weight:600; color:var(--accent);
      letter-spacing:0.05em;
    }
    .cal-nav button{
      border:none; background:none; font-weight:600;
      color:var(--accent); cursor:pointer; font-size:16px; transition:.2s ease;
    }
    .cal-nav button:hover{ opacity:0.7; }
    #prevMonth::before{ content:"‹"; }
    #nextMonth::before{ content:"›"; }

    .cal-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      grid-auto-rows:var(--calCellH);
      row-gap:6px; column-gap:0;
      align-content:start; margin-top:0;
    }
    .cal-dow{
      font-size:12px; color:var(--sub); text-transform:lowercase;
      display:flex; align-items:center; justify-content:center;
      height:var(--calCellH); margin:0; padding-bottom:2px;
    }
    .cal-cell,.cal-empty{
      display:flex; align-items:center; justify-content:center;
      height:var(--calCellH); padding:0; margin:0;
      background:none; border:none; position:relative; cursor:pointer;
    }
    .cal-empty{ visibility:hidden; }

    .cal-cell .num{
      font-size:14px; font-weight:500; color:var(--ink);
      display:flex; align-items:center; justify-content:center;
      width:32px; height:32px; border-radius:50%;
      transition: background .25s ease, color .25s ease;
    }
    .cal-cell.today .num{ border:1px solid var(--accent); }
    .cal-cell.has-event .dot{
      width:5px; height:5px; border-radius:50%;
      background:var(--accent); position:absolute;
      bottom:4px; right:calc(50% - 2.5px);
    }
    .cal-cell.selected .num{ background:#dcefff; color:#3f5364; }

    .cal-drawer{ margin-top:14px; padding:10px 8px; }
    .cal-item{ padding:4px 0; }
    .cal-item .title{ font-weight:600; color:var(--ink); font-size:14px; }
    .cal-item .meta{ color:var(--sub); font-size:13px; margin-top:2px; }

    .cal-title-block{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      margin-bottom:14px; line-height:1.1;
    }
    .cal-title-year{ font-size:16px; font-weight:600; color:var(--accent); letter-spacing:0.04em; }
    .cal-title-month{ font-size:36px; font-weight:700; color:var(--accent); letter-spacing:0.06em; }
    .cal-title-name{ font-size:15px; font-weight:500; color:var(--sub); letter-spacing:0.05em; margin-top:4px; }

    /* hidden 属性は必ず非表示にする（保険） */
    .schedule-window [hidden] { display: none !important; }

    @media (max-width:720px){
      header{ padding:0 16px; }
    }
  </style>
</head>
<body>
  <header>
    <!-- floor.html へ戻る -->
    <a href="../index.html" class="back-btn">← other room</a>

    <h1 class="page-title">Garden / Schedule</h1>
    <p class="page-sub">庭に植えた予定たち。これからの楽しみをここに並べておく場所。</p>

    <div class="toggle">
      <button id="btnList" class="active">List</button>
      <button id="btnCal">Calendar</button>
    </div>
  </header>

  <section class="schedule-window" aria-label="スケジュール">
    <div id="listView" class="list-view"></div>

    <div id="calView" class="cal-view">
      <div class="cal-wrap">
        <div class="cal-nav">
          <button id="prevMonth" aria-label="Previous month"></button>
          <h3 id="calTitle">2025年10月</h3>
          <button id="nextMonth" aria-label="Next month"></button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-drawer" id="calDrawer"></div>
      </div>
    </div>
  </section>

  <!-- events.js は index.html と同じ階層に置いてる想定 -->
  <script src="events.js"></script>
  <script>
    const jpWeek=["sun.","mon.","tue.","wed.","thu.","fri.","sat."];
    const safe=(s)=>String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;","&gt;":"&gt;","\"":"&quot;","'":"&#39;"}[m]));

    /* === リスト === */
    const listView=document.getElementById("listView");
    function renderList(){
      listView.innerHTML="";
      const today=new Date(); today.setHours(0,0,0,0);
      const upcoming=events
        .filter(ev=>new Date(ev.date)>=today)
        .sort((a,b)=>a.date.localeCompare(b.date));

      let currentMonth="";
      const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
      const weekNames=["sun.","mon.","tue.","wed.","thu.","fri.","sat."];

      upcoming.forEach(ev=>{
        const dateObj=new Date(ev.date+"T00:00:00+09:00");
        const m=dateObj.getMonth()+1, d=dateObj.getDate(), w=weekNames[dateObj.getDay()];
        if(m!==currentMonth){
          currentMonth=m;
          const monthLabel=String(m).padStart(2,"0");
          listView.insertAdjacentHTML("beforeend",`
            <div class="month-block">
              <div class="month-number">${monthLabel}</div>
              <div class="month-name">${monthNames[m-1]}</div>
            </div>`);
        }
        listView.insertAdjacentHTML("beforeend",`
          <article class="event-line">
            <div class="event-left">
              <div class="event-day">${d}</div>
              <div class="event-w">${w}</div>
            </div>
            <div class="event-info">
              <div class="title">${safe(ev.title)}</div>
            </div>
          </article>`);
      });
    }

    /* === カレンダー === */
    const calGrid=document.getElementById("calGrid");
    const calDrawer=document.getElementById("calDrawer");
    const calTitle=document.getElementById("calTitle");
    let viewYear,viewMonth;

    function renderDOW(){
      calGrid.innerHTML="";
      jpWeek.forEach(d=>{
        calGrid.insertAdjacentHTML("beforeend",`<div class="cal-dow">${d}</div>`);
      });
    }

    function renderMonth(y,m){
      renderDOW();

      const monthNamesFull=["January","February","March","April","May","June","July","August","September","October","November","December"];
      calTitle.innerHTML=`
        <div class="cal-title-block">
          <div class="cal-title-year">${y}</div>
          <div class="cal-title-month">${String(m).padStart(2,'0')}</div>
          <div class="cal-title-name">${monthNamesFull[m-1]}</div>
        </div>`;

      const first=new Date(y,m-1,1);
      const start=first.getDay();
      const last=new Date(y,m,0).getDate();
      const today=new Date();
      const todayKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

      for(let i=0;i<start;i++){
        calGrid.insertAdjacentHTML("beforeend",`<div class="cal-cell cal-empty"></div>`);
      }

      for(let d=1; d<=last; d++){
        const dateKey=`${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const evDay=events.filter(e=>e.date===dateKey);
        const has=evDay.length>0;
        calGrid.insertAdjacentHTML("beforeend",`
          <button class="cal-cell ${has?"has-event":""} ${dateKey===todayKey?"today":""}" data-date="${dateKey}">
            <div class="num">${d}</div>
            ${has?'<span class="dot"></span>':""}
          </button>`);
      }
    }

    /* === クリック委譲 === */
    calGrid.addEventListener("click",(e)=>{
      const cell=e.target.closest(".cal-cell[data-date]");
      if(!cell) return;
      const dateKey=cell.dataset.date;
      const dayEvents=events.filter(e=>e.date===dateKey);
      const prev=calGrid.querySelector(".cal-cell.selected");
      if(prev) prev.classList.remove("selected");
      cell.classList.add("selected");
      openDrawer(dateKey,dayEvents);
    });

    function openDrawer(dateKey,dayEvents){
      const weekEn=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const monthAbv=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const d=new Date(dateKey+"T00:00:00+09:00");
      const head=`${weekEn[d.getDay()]}, ${monthAbv[d.getMonth()]} ${d.getDate()}`;

      calDrawer.innerHTML=`
        <div class="cal-head" style="font-weight:700; margin-bottom:6px;">${head}</div>
        ${
          dayEvents.length
            ? dayEvents.map(ev=>`
                <div class="cal-item">
                  <div class="title">${safe(ev.title)}</div>
                  <div class="meta">
                    ${ev.time? safe(ev.time)+" ｜ ":""}
                    ${ev.place? safe(ev.place):""}
                  </div>
                  ${ev.tags?.length
                    ? `<div class="event-tags" style="margin-top:8px;">
                        ${ev.tags.map(t=>`<span class="tag">${safe(t)}</span>`).join("")}
                      </div>`
                    : ""}
                </div>`).join("")
            : `<div class="cal-item"><div class="meta">No events on this day.</div></div>`
        }`;
    }

    document.getElementById("prevMonth").addEventListener("click",()=>{
      viewMonth--;
      if(viewMonth<1){viewMonth=12;viewYear--;}
      renderMonth(viewYear,viewMonth);
    });
    document.getElementById("nextMonth").addEventListener("click",()=>{
      viewMonth++;
      if(viewMonth>12){viewMonth=1;viewYear++;}
      renderMonth(viewYear,viewMonth);
    });

    const btnList=document.getElementById("btnList");
    const btnCal=document.getElementById("btnCal");
    const calView=document.getElementById("calView");

    function setMode(mode){
      const isList=mode==="list";
      listView.hidden=!isList;
      calView.hidden=isList;
      btnList.classList.toggle("active",isList);
      btnCal.classList.toggle("active",!isList);
    }

    (function init(){
      renderList();
      const now=new Date();
      viewYear=now.getFullYear();
      viewMonth=now.getMonth()+1;
      renderMonth(viewYear,viewMonth);

      const startMode=location.hash==="#cal"?"cal":"list";
      setMode(startMode);

      btnList.addEventListener("click",()=>{
        setMode("list");
        history.replaceState(null,"","#list");
      });
      btnCal.addEventListener("click",()=>{
        setMode("cal");
        history.replaceState(null,"","#cal");
      });
    })();
  </script>
</body>
</html>
