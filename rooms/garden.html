<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden | Schedule</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="garden.css">
</head>

<body>
  <header id="top">
    <div class="header-area">
      <div class="logo-area">
        <img src="../img/lefttop.png" alt="">
        <a href="../index.html#top" class="logo">
          <img src="../img/37dk-logowhite.svg" alt="37dklogo">
        </a>
      </div>
      <nav class="gnav-menu" aria-label="メニュー">
        <div class="menu-area">
          <img src="../img/righttop.png" alt="">
          <button class="menu-btn" type="button">
            <div class="menu">
              <img src="../img/menu-btn.svg" alt="">
            </div>
            <div class="close">
              <img src="../img/close-btn.svg" alt="">
            </div>
          </button>
          <ul class="gnav-list" id="gnav-list">
            <li>
              <a href="../index.html#ldk" class="room-btn ldk">LDK（SNS）</a>
            </li>
            <li>
              <a href="../index.html#youtube" class="room-btn kids">子ども部屋（さなちゅぶ。）</a>
            </li>
            <li>
              <a href="../index.html#youtube" class="room-btn bath">お風呂場（さなろぐ）</a>
            </li>
            <li>
              <a href="garden.html" class="room-btn garden">庭（SCHEDULE）</a>
            </li>
            <li>
              <a href="bedroom.html" class="room-btn bed">ベッドルーム（DIARY）</a>
            </li>
            <li>
              <a href="study.html" class="room-btn study">書斎（COLLECTION）</a>
            </li>
          </ul>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="schedule">
      <h1>Garden</h1>
      <h2>Schedule</h2>

      <div class="calendar">
        <div class="calendar-header">
          <button id="prev-month" type="button">＜</button>
          <h3 id="calendar-title"></h3>
          <button id="next-month" type="button">＞</button>
        </div>

        <table class="calendar-table">
          <thead>
            <tr>
              <th>Sun</th>
              <th>Mon</th>
              <th>Tue</th>
              <th>Wed</th>
              <th>Thu</th>
              <th>Fri</th>
              <th>Sat</th>
            </tr>
          </thead>
          <tbody id="calendar-body"></tbody>
        </table>
      </div>

      <div class="schedule-list">
        <h3>Coming Up</h3>
        <ul id="coming-up-list"></ul>
      </div>
    </section>
  </main>


  <script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script src="../js/gnav.js"></script>
  <script src="../js/events.js"></script>
  <script src="../js/garden.js"></script>
</body>

</html>
